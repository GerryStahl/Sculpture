# ──────────────────────────────────────────────
# Sculpture Pipeline – default configuration
# ──────────────────────────────────────────────

paths:
  photos_dir: photos/
  data_raw: data/raw/
  data_processed: data/processed/
  calibration_dir: data/calibration/
  output_dir: data/output/

preprocessing:
  # Target longest edge (pixels); 0 = no resize
  max_size: 2048
  # Background removal model: Apple Vision only
  bg_removal: apple_vision
  # Gaussian denoising kernel size (0 = skip)
  denoise_ksize: 0

calibration:
  # Checkerboard inner corners
  board_cols: 9
  board_rows: 6
  square_size_mm: 25.0
  # Use stored calibration file if present
  calib_file: data/calibration/camera_intrinsics.json

reconstruction:
  # "colmap" | "open3d" (open3d = legacy ORB heuristic, low quality)
  method: colmap
  colmap_bin: colmap
  # Set to true to request dense MVS after sparse SfM.
  # On Apple Silicon this prefers OpenMVS when installed, since COLMAP dense
  # stereo requires CUDA and cannot run on Metal GPUs.
  use_depth_prior: true
  # "auto" | "openmvs" | "colmap" | "none"
  dense_backend: auto
  openmvs_interface_colmap_bin: InterfaceCOLMAP
  openmvs_densify_bin: DensifyPointCloud
  openmvs_resolution_level: 1
  openmvs_number_views: 0

meshing:
  # "ball_pivot" | "poisson" | "alpha_shape"
  method: poisson
  poisson_depth: 10
  # Remove components smaller than this fraction of the largest
  min_component_frac: 0.01
  # Target face count after simplification (0 = skip)
  simplify_faces: 0

wireframe:
  # Dihedral angle threshold (deg) to detect feature edges
  feature_angle_deg: 30.0
  # Minimum edge length fraction of bounding-box diagonal
  min_edge_frac: 0.005
  # Export format: "obj" | "svg" | "json_graph"
  export_format: obj

logging:
  level: INFO
  file: data/output/pipeline.log
