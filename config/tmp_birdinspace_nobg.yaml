paths:
  photos_dir: photos/
  data_raw: data/raw/
  data_processed: data/processed/
  calibration_dir: data/calibration/
  output_dir: data/output/birdinspace_nobg/

preprocessing:
  max_size: 1280
  bg_removal: none
  denoise_ksize: 0

calibration:
  board_cols: 9
  board_rows: 6
  square_size_mm: 25.0
  calib_file: data/calibration/camera_intrinsics.json

reconstruction:
  method: open3d
  colmap_bin: colmap
  use_depth_prior: false

meshing:
  method: poisson
  poisson_depth: 8
  min_component_frac: 0.01
  simplify_faces: 25000

wireframe:
  feature_angle_deg: 30.0
  min_edge_frac: 0.005
  export_format: obj

logging:
  level: INFO
  file: data/output/birdinspace_nobg/pipeline.log
